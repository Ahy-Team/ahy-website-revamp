<section class="about-scroll-container">
    <div class="about-sticky-wrap">
        <div class="about-main-frame">
            <div class="about-center-content">
                <div id="progress-container">
                    <div class="alfa-slab-one-regular" id="progress">
                        OUR <br />
                        CAPABILITIES
                    </div>

                </div>
            </div>
            <div class="about-bottom-panel">
                <div class="about-counter-box" id="counter1">
                    <img src="assets/tick-2.svg" alt="Tick" class="counter-icon" loading="lazy" decoding="async"
                        height="100%" width="100%" />
                    <span class="count">0</span>
                    <p>Projects Delivered</p>
                </div>
                <div class="about-counter-box" id="counter2">
                    <img src="assets/arrow-up.svg" alt="Arrow up" class="counter-icon" loading="lazy" decoding="async"
                        height="100%" width="100%" />
                    <span class="count">0</span>
                    <p>Years of expertise</p>
                </div>
                <div class="about-counter-box" id="counter3">
                    <img src="assets/star.svg" alt="Star" class="counter-icon" loading="lazy" decoding="async"
                        height="100%" width="100%" />
                    <span class="count">0</span>
                    <p>Client Reviews</p>
                </div>
            </div>

            <!-- Our Partners Section (integrated) -->
            <section class="our-partner-section">
                <div class="our-partner-container">
                    <div class="our-partner-text-column">
                        <p>                                                                                                                                                                                           
                            Every business challenge requires a different combination of expertise. Explore the capabilities we bring together to design, engineer, modernize, and evolve intelligent digital systems.
                        </p>                                                                                                                                                                                          
                        <a href="/our-capabilities" class="blreveal-static-btn">                                                                                                         
                            Explore Our Capabilities           
                        </a>                                                                                                                                                                                          
                    </div>
                </div>
            </section>
        </div>
    </div>
</section>
