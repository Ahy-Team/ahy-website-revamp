        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }

            let gaLoaded = false;

            function loadGA() {
                if (gaLoaded) return;
                gaLoaded = true;

                const s = document.createElement("script");
                s.src = "https://www.googletagmanager.com/gtag/js?id=UA-72482257-1";
                s.async = true;
                document.head.appendChild(s);

                gtag("js", new Date());
                gtag("config", "UA-72482257-1", {
                    send_page_view: true,
                });
            }

            ["scroll", "click", "mousemove", "touchstart"].forEach((e) => window.addEventListener(e, loadGA, { once: true, passive: true }));
        </script>

        <!-- Section-nav: smooth scroll (ScrollSmoother-aware) -->
        <script>
            (function () {
                var nav = document.querySelector(".caps-subnav");
                if (!nav) return;

                var links = Array.prototype.slice.call(nav.querySelectorAll("[data-scroll-link]"));

                nav.addEventListener("click", function (e) {
                    var link = e.target.closest("[data-scroll-link]");
                    if (!link) return;
                    var target = document.querySelector(link.getAttribute("href"));
                    if (!target) return;
                    e.preventDefault();
                    var smoother = window.ScrollSmoother && ScrollSmoother.get && ScrollSmoother.get();
                    if (smoother) {
                        smoother.scrollTo(target, true, "top 100px");
                    } else {
                        target.scrollIntoView({ behavior: "smooth", block: "start" });
                    }
                });

                // Highlight the active section link (#ec1965) as each is reached.
                // Sections load lazily, so wire each one up as it appears.
                var ids = ["#capabilities", "#how-we-work", "#team-depth", "#contact"];
                var wired = {};
                var tries = 0;
                (function setup() {
                    if (window.ScrollTrigger) {
                        var added = false;
                        ids.forEach(function (id) {
                            if (wired[id]) return;
                            var sec = document.querySelector(id);
                            if (!sec) return;
                            wired[id] = true;
                            added = true;
                            ScrollTrigger.create({
                                trigger: sec,
                                start: "top center",
                                end: "bottom center",
                                onToggle: function (self) {
                                    if (!self.isActive) return;
                                    links.forEach(function (a) {
                                        a.classList.toggle("active", a.getAttribute("href") === id);
                                    });
                                },
                            });
                        });
                        if (added) ScrollTrigger.refresh();
                    }
                    if (Object.keys(wired).length < ids.length && tries++ < 600) {
                        requestAnimationFrame(setup);
                    }
                })();
            })();
        </script>
