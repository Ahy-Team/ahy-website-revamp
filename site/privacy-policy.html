        <!-- ScrollSmoother wrapper structure -->
        <div id="smooth-wrapper">
            <div id="smooth-content">
                <main>
                    <div data-component="privacy-policy" style="min-height: 100vh; background-color: var(--primary-color);"></div>
                </main>
                <script>
                    /* Load the legal content immediately and in parallel (not queued behind the
                       header). Show the dot loader briefly, then hide it as soon as the content
                       is ready — with a minimum so it's actually seen and a hard 1s cap. */
                    (function () {
                        var name = "privacy-policy";
                        var host = document.querySelector('[data-component="' + name + '"]');
                        if (!host) return;
                        host.removeAttribute("data-component"); // remove from the sequential queue

                        // Load the component CSS with a cache-busting version (avoids stale
                        // service-worker cache serving old styles).
                        var css = document.createElement("link");
                        css.rel = "stylesheet";
                        css.href = "/css/components/" + name + ".css?v=" + Date.now();
                        document.head.appendChild(css);

                        var MIN_MS = 500;  // keep the loader visible at least this long
                        var MAX_MS = 1000; // never show it longer than this
                        var start = Date.now();
                        var hidden = false;

                        function hideLoader() {
                            if (hidden) return;
                            hidden = true;
                            var el = document.getElementById("legalLoader");
                            if (!el) return;
                            el.style.opacity = "0";
                            setTimeout(function () { el.remove(); }, 500); // matches the 0.5s fade
                        }

                        fetch("/components/" + name + ".html?v=" + Date.now(), { cache: "no-store" })
                            .then(function (r) { return r.text(); })
                            .then(function (html) {
                                host.innerHTML = html;
                                var wait = Math.max(0, MIN_MS - (Date.now() - start));
                                setTimeout(hideLoader, wait);
                            })
                            .catch(hideLoader);

                        setTimeout(hideLoader, MAX_MS); // hard cap
                    })();
                </script>
                <div data-component="footer"></div>
            </div>
